spring:
  application:
    name: letterPick
  jpa:
    properties:
      hibernate.jdbc.time_zone: UTC
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-secret}
            scope: openid,profile,email
          naver:
            client-id: ${NAVER_CLIENT_ID:dummy-naver-id}
            client-secret: ${NAVER_CLIENT_SECRET:dummy-naver-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            scope: name,email,profile_image
            client-name: Naver
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# OAuth 가입/로그인 후 redirect 대상 + CORS allowed origin.
# 운영 환경은 FRONTEND_BASE_URL 환경변수로 주입한다.
frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

newsletter:
  inbox-address:
    domain: ${NEWSLETTER_INBOX_ADDRESS_DOMAIN:inbound.letterpick.local}
