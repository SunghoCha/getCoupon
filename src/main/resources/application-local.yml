spring:
  cloud:
    aws:
      sqs:
        enabled: ${LETTERPICK_SQS_ENABLED:false}
  datasource:
    url: jdbc:mysql://localhost:3306/letterpick
    username: letterpick
    password: letterpickpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

newsletter:
  inbox-address:
    domain: ${NEWSLETTER_INBOX_ADDRESS_DOMAIN:inbound.letterpick.local}

letterpick:
  seed:
    member:
      local-test:
        enabled: true
    newsletter:
      enabled: true
      local-test:
        enabled: true
