spring:
  datasource:
    url: jdbc:mysql://localhost:3306/letterpick
    username: letterpick
    password: letterpickpass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

newsletter:
  inbox-address:
    domain: ${NEWSLETTER_INBOX_ADDRESS_DOMAIN:inbound.letterpick.local}

letterpick:
  seed:
    newsletter:
      enabled: true
