services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: letterpick
      MYSQL_USER: letterpick
      MYSQL_PASSWORD: letterpickpass
    ports:
      - "3306:3306"
    volumes:
      - letterpick-mysql-data:/var/lib/mysql

volumes:
  letterpick-mysql-data:
